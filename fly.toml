app = "babushkin-ogorod"  # поменяй на своё имя
primary_region = "ams"    # Amsterdam — хорошо для СНГ

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = true
  auto_start_machines = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]